<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCA Portfolio Manager - Quản lý đầu tư cá nhân</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div class="min-h-screen pb-12">
        <!-- Header -->
        <header class="bg-indigo-700 text-white py-8 mb-8 shadow-lg">
            <div class="container mx-auto px-4">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2">
                            <i data-lucide="trending-up"></i> DCA Portfolio Manager
                        </h1>
                        <p class="text-indigo-100 mt-1 opacity-80">Theo dõi hành trình tích sản mỗi tháng</p>
                    </div>
                    <div class="bg-indigo-600/50 px-6 py-3 rounded-2xl border border-indigo-400/30">
                        <span class="text-xs font-semibold uppercase tracking-wider text-indigo-200">Tổng vốn đầu tư</span>
                        <div class="text-2xl md:text-3xl font-bold" id="total-invested">0 ₫</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- Cột trái: Nhập liệu & Biểu đồ -->
                <div class="lg:col-span-4 space-y-8">
                    
                    <!-- Form Nhập liệu -->
                    <section class="glass-card p-6 rounded-3xl shadow-sm">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <i data-lucide="plus-circle" class="text-indigo-600"></i> Thêm giao dịch mới
                        </h2>
                        <form id="transaction-form" class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Ngày giao dịch</label>
                                <input type="date" id="date" required class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Loại tài sản</label>
                                <select id="asset-type" required class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white">
                                    <option value="Chứng khoán">Chứng khoán</option>
                                    <option value="Chứng chỉ quỹ">Chứng chỉ quỹ</option>
                                    <option value="Bạc">Tích sản (Bạc)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mã / Tên tài sản</label>
                                <input type="text" id="asset-name" placeholder="VD: VNM, FPT, TCBF..." required class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Số tiền đầu tư (VNĐ)</label>
                                <input type="number" id="amount" placeholder="VD: 1000000" required class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all transform active:scale-[0.98]">
                                Lưu giao dịch
                            </button>
                        </form>
                    </section>

                    <!-- Biểu đồ phân bổ -->
                    <section class="glass-card p-6 rounded-3xl shadow-sm">
                        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                            <i data-lucide="pie-chart" class="text-indigo-600"></i> Tỷ trọng danh mục
                        </h2>
                        <div class="relative h-64">
                            <canvas id="allocationChart"></canvas>
                        </div>
                    </section>
                </div>

                <!-- Cột phải: Lịch sử giao dịch -->
                <div class="lg:col-span-8">
                    <section class="glass-card rounded-3xl shadow-sm overflow-hidden h-full flex flex-col">
                        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                            <h2 class="text-lg font-bold flex items-center gap-2">
                                <i data-lucide="list" class="text-indigo-600"></i> Lịch sử giao dịch
                            </h2>
                            <span class="text-xs font-medium text-slate-400" id="transaction-count">0 giao dịch</span>
                        </div>
                        
                        <div class="overflow-x-auto custom-scrollbar flex-grow">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50/50 text-slate-500 uppercase text-[10px] font-bold tracking-wider">
                                    <tr>
                                        <th class="px-6 py-4">Ngày</th>
                                        <th class="px-6 py-4">Loại</th>
                                        <th class="px-6 py-4">Tài sản</th>
                                        <th class="px-6 py-4 text-right">Số tiền</th>
                                        <th class="px-6 py-4 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-list" class="divide-y divide-slate-100">
                                    <!-- Dữ liệu sẽ render ở đây -->
                                </tbody>
                            </table>
                            
                            <!-- Empty State -->
                            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                                <i data-lucide="database" class="w-12 h-12 mb-4 opacity-20"></i>
                                <p>Chưa có dữ liệu giao dịch nào.</p>
                            </div>
                        </div>
                    </section>
                </div>

            </div>
        </main>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Khởi tạo Lucide Icons
        lucide.createIcons();

        // State của ứng dụng
        let transactions = JSON.parse(localStorage.getItem('dca_portfolio_data')) || [];
        let myChart = null;

        // DOM Elements
        const form = document.getElementById('transaction-form');
        const transactionList = document.getElementById('transaction-list');
        const totalInvestedEl = document.getElementById('total-invested');
        const countEl = document.getElementById('transaction-count');
        const emptyState = document.getElementById('empty-state');

        // Định dạng tiền tệ VNĐ
        const formatVND = (amount) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        // Cập nhật Dashboard & Biểu đồ
        const updateUI = () => {
            // 1. Render danh sách
            transactionList.innerHTML = '';
            if (transactions.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                // Sắp xếp theo ngày mới nhất
                const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                sorted.forEach((t) => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50/80 transition-colors";
                    
                    // Badge màu cho loại tài sản
                    let badgeClass = "";
                    if(t.type === "Chứng khoán") badgeClass = "bg-blue-100 text-blue-700";
                    else if(t.type === "Chứng chỉ quỹ") badgeClass = "bg-emerald-100 text-emerald-700";
                    else badgeClass = "bg-amber-100 text-amber-700";

                    row.innerHTML = `
                        <td class="px-6 py-4 text-slate-500 font-medium">${t.date}</td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase ${badgeClass}">${t.type}</span>
                        </td>
                        <td class="px-6 py-4 font-bold text-slate-700">${t.name}</td>
                        <td class="px-6 py-4 text-right font-mono font-semibold text-indigo-600">${formatVND(t.amount)}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteTransaction('${t.id}')" class="p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    `;
                    transactionList.appendChild(row);
                });
                lucide.createIcons();
            }

            // 2. Tính tổng vốn
            const total = transactions.reduce((sum, t) => sum + Number(t.amount), 0);
            totalInvestedEl.innerText = formatVND(total);
            countEl.innerText = `${transactions.length} giao dịch`;

            // 3. Cập nhật Biểu đồ
            updateChart();
        };

        // Logic xử lý biểu đồ Chart.js
        const updateChart = () => {
            const dataMap = {
                'Chứng khoán': 0,
                'Chứng chỉ quỹ': 0,
                'Bạc': 0
            };

            transactions.forEach(t => {
                if (dataMap[t.type] !== undefined) {
                    dataMap[t.type] += Number(t.amount);
                }
            });

            const ctx = document.getElementById('allocationChart').getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(dataMap),
                    datasets: [{
                        data: Object.values(dataMap),
                        backgroundColor: ['#4f46e5', '#10b981', '#f59e0b'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                padding: 20,
                                font: { size: 11, weight: '600' }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.label}: ${formatVND(context.raw)}`;
                                }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });
        };

        // Thêm giao dịch
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newTransaction = {
                id: Date.now().toString(),
                date: document.getElementById('date').value,
                type: document.getElementById('asset-type').value,
                name: document.getElementById('asset-name').value,
                amount: document.getElementById('amount').value
            };

            transactions.push(newTransaction);
            localStorage.setItem('dca_portfolio_data', JSON.stringify(transactions));
            
            form.reset();
            // Set lại ngày mặc định là hôm nay
            document.getElementById('date').valueAsDate = new Date();
            
            updateUI();
        });

        // Xóa giao dịch
        window.deleteTransaction = (id) => {
            if(confirm('Bạn có chắc chắn muốn xóa giao dịch này không?')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('dca_portfolio_data', JSON.stringify(transactions));
                updateUI();
            }
        };

        // Khởi tạo app
        document.getElementById('date').valueAsDate = new Date();
        updateUI();

    </script>
</body>
</html>
